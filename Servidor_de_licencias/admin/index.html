<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Arkhe Licencias</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { flex: 1; background: #3498db; color: white; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-card.green { background: #2ecc71; }
        .stat-card.red { background: #e74c3c; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #666; }
        .btn { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-revoke { background: #e74c3c; color: white; }
        .btn-revoke:hover { background: #c0392b; }
        .btn-add { background: #2ecc71; color: white; margin-bottom: 20px; }
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .badge-active { background: #eafff0; color: #2ecc71; }
        .badge-expired { background: #fff1f0; color: #e74c3c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Administración de Licencias Arkhe</h1>
        
        <div class="stats">
            <div class="stat-card">
                <h3>Total Licencias</h3>
                <p id="total-count">0</p>
            </div>
            <div class="stat-card green">
                <h3>Activas</h3>
                <p id="active-count">0</p>
            </div>
            <div class="stat-card red">
                <h3>Expiradas</h3>
                <p id="expired-count">0</p>
            </div>
        </div>

        <button class="btn btn-add">+ Generar Nueva Licencia</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Email</th>
                    <th>Clave de Activación</th>
                    <th>Dispositivo</th>
                    <th>Expiración</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="license-table-body">
                <!-- Data will be loaded via JS -->
                <tr>
                    <td colspan="7" style="text-align:center;">Cargando datos...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        // Simulación de carga de datos (Reemplazar con fetch a /api/list si lo implementas)
        async function loadLicenses() {
            // Placeholder: Aquí llamarías a un endpoint GET /api/licenses si existiera
            const tbody = document.getElementById('license-table-body');
            // Datos de ejemplo para visualizar el diseño
            const mockData = [
                { id: 1, email: 'cliente@ejemplo.com', clave: 'ARKH-XXXX-YYYY', device: 'MAC-12345', expira: '2025-12-31', estado: 'activa' },
                { id: 2, email: 'demo@arkhe.com', clave: 'ARKH-DEMO-2024', device: 'WIN-98765', expira: '2024-06-01', estado: 'expirada' }
            ];

            tbody.innerHTML = mockData.map(l => `
                <tr>
                    <td>${l.id}</td>
                    <td>${l.email}</td>
                    <td><code>${l.clave}</code></td>
                    <td>${l.device || '-'}</td>
                    <td>${l.expira}</td>
                    <td><span class="badge badge-${l.estado}">${l.estado}</span></td>
                    <td>
                        <button class="btn btn-revoke" onclick="revokeLicense('${l.clave}', '${l.device}')">Revocar</button>
                    </td>
                </tr>
            `).join('');
            
            document.getElementById('total-count').textContent = mockData.length;
            document.getElementById('active-count').textContent = mockData.filter(x => x.estado === 'activa').length;
            document.getElementById('expired-count').textContent = mockData.filter(x => x.estado === 'expirada').length;
        }

        async function revokeLicense(clave, deviceId) {
            if(!confirm('¿Estás seguro de que deseas revocar esta licencia? El usuario ya no podrá usar el software.')) return;
            
            // Simulación de llamada a /api/revoke
            console.log('Revocando:', clave, deviceId);
            alert('Licencia revocada correctamente (Simulación)');
        }

        loadLicenses();
    </script>
</body>
</html>
