name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Se activa cuando se crea un tag como v1.12.8
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub Actions

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Vite
        run: npm run build:vite
      
      - name: Build Electron for Windows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:win
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: Ejecutables/
          retention-days: 30
  
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build Vite
        run: npm run build:vite
      
      - name: Build Electron for macOS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run release:mac
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: Ejecutables/
          retention-days: 30
  
  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-windows
          path: Ejecutables/
      
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-macos
          path: Ejecutables/
      
      - name: List artifacts
        run: ls -la Ejecutables/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            Ejecutables/*.exe
            Ejecutables/*.dmg
            Ejecutables/*.zip
            Ejecutables/*.yml
            Ejecutables/*.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
