<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pasarela de Pago | Arkhe Aula</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        .checkout-box {
            max-width: 500px;
            margin: 150px auto;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
        }
        .item-detail {
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 1.5rem;
            margin-bottom: 2rem;
        }
        .methods {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .btn-pay {
            display: block;
            padding: 1rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .paypal { background: #ffc439; color: #111; }
        .stripe { background: #635bff; color: white; }
    </style>
</head>
<body style="background: #030712;">
    <div class="checkout-box">
        <h2>Confirmar Compra</h2>
        <div id="product-info" class="item-detail">
            <p>Procesando pedido...</p>
        </div>
        
        <p style="margin-bottom: 1.5rem; color: #94a3b8;">Selecciona tu método de pago:</p>
        <div class="methods">
            <a href="#" class="btn-pay paypal">Pagar con PayPal <i class="fab fa-paypal"></i></a>
            <a href="#" class="btn-pay stripe">Pagar con Tarjeta <i class="fas fa-credit-card"></i></a>
        </div>
        
        <a href="index.html" style="display: block; margin-top: 2rem; color: #6366f1; text-decoration: none;">← Volver</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const infoDiv = document.getElementById('product-info');

        if (productId === '2') {
            infoDiv.innerHTML = '<p>Licencia Vitalicia Arkhe Aula</p><h3 class="price">$1,299.00 MXN</h3>';
        } else {
            infoDiv.innerHTML = '<p>Licencia Anual Arkhe Aula</p><h3 class="price">$499.00 MXN</h3>';
        }
    </script>
</body>
</html>
